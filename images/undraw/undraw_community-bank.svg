<svg xmlns="http://www.w3.org/2000/svg" width="400" height="340" viewBox="0 0 400 340" role="img">
  <!-- Base/Ground -->
  <rect x="40" y="290" width="320" height="12" rx="4" fill="#e6e6e6"/>
  <rect x="60" y="278" width="280" height="16" rx="3" fill="#3f3d56"/>

  <!-- Building body -->
  <rect x="80" y="120" width="240" height="158" rx="2" fill="#f2f2f2"/>

  <!-- Windows between columns (left pair: between col 1 and col 2) -->
  <rect x="118" y="150" width="36" height="45" rx="3" fill="#3f3d56"/>
  <rect x="122" y="154" width="28" height="37" rx="2" fill="#d6dce6"/>
  <line x1="136" y1="154" x2="136" y2="191" stroke="#3f3d56" stroke-width="1.5"/>
  <line x1="122" y1="172" x2="150" y2="172" stroke="#3f3d56" stroke-width="1.5"/>

  <rect x="118" y="210" width="36" height="40" rx="3" fill="#3f3d56"/>
  <rect x="122" y="214" width="28" height="32" rx="2" fill="#d6dce6"/>
  <line x1="136" y1="214" x2="136" y2="246" stroke="#3f3d56" stroke-width="1.5"/>
  <line x1="122" y1="230" x2="150" y2="230" stroke="#3f3d56" stroke-width="1.5"/>

  <!-- Windows between columns (right pair: between col 3 and col 4) -->
  <rect x="246" y="150" width="36" height="45" rx="3" fill="#3f3d56"/>
  <rect x="250" y="154" width="28" height="37" rx="2" fill="#d6dce6"/>
  <line x1="264" y1="154" x2="264" y2="191" stroke="#3f3d56" stroke-width="1.5"/>
  <line x1="250" y1="172" x2="278" y2="172" stroke="#3f3d56" stroke-width="1.5"/>

  <rect x="246" y="210" width="36" height="40" rx="3" fill="#3f3d56"/>
  <rect x="250" y="214" width="28" height="32" rx="2" fill="#d6dce6"/>
  <line x1="264" y1="214" x2="264" y2="246" stroke="#3f3d56" stroke-width="1.5"/>
  <line x1="250" y1="230" x2="278" y2="230" stroke="#3f3d56" stroke-width="1.5"/>

  <!-- Door (between columns 2 and 3) -->
  <rect x="180" y="200" width="40" height="78" rx="4" fill="#3f3d56"/>
  <rect x="184" y="204" width="32" height="74" rx="3" fill="#FF6B07"/>
  <circle cx="210" cy="242" r="2.5" fill="#3f3d56"/>

  <!-- Columns -->
  <rect x="92" y="120" width="14" height="158" rx="3" fill="#e6e6e6" stroke="#3f3d56" stroke-width="1"/>
  <rect x="160" y="120" width="14" height="158" rx="3" fill="#e6e6e6" stroke="#3f3d56" stroke-width="1"/>
  <rect x="226" y="120" width="14" height="158" rx="3" fill="#e6e6e6" stroke="#3f3d56" stroke-width="1"/>
  <rect x="294" y="120" width="14" height="158" rx="3" fill="#e6e6e6" stroke="#3f3d56" stroke-width="1"/>

  <!-- Column capitals -->
  <rect x="88" y="116" width="22" height="8" rx="2" fill="#3f3d56"/>
  <rect x="156" y="116" width="22" height="8" rx="2" fill="#3f3d56"/>
  <rect x="222" y="116" width="22" height="8" rx="2" fill="#3f3d56"/>
  <rect x="290" y="116" width="22" height="8" rx="2" fill="#3f3d56"/>

  <!-- Column bases -->
  <rect x="88" y="274" width="22" height="6" rx="2" fill="#3f3d56"/>
  <rect x="156" y="274" width="22" height="6" rx="2" fill="#3f3d56"/>
  <rect x="222" y="274" width="22" height="6" rx="2" fill="#3f3d56"/>
  <rect x="290" y="274" width="22" height="6" rx="2" fill="#3f3d56"/>

  <!-- Entablature -->
  <rect x="70" y="106" width="260" height="14" rx="2" fill="#3f3d56"/>

  <!-- Pediment (triangle) -->
  <polygon points="200,30 70,106 330,106" fill="#FF6B07"/>
  <polygon points="200,42 85,102 315,102" fill="#f2f2f2"/>

  <!-- Steps -->
  <rect x="150" y="278" width="100" height="5" rx="1" fill="#e6e6e6"/>
  <rect x="145" y="283" width="110" height="5" rx="1" fill="#d6dce6"/>
  <rect x="140" y="288" width="120" height="5" rx="1" fill="#ccc"/>
</svg>