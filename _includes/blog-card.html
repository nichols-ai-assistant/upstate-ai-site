<a href="{{ include.post.url }}" style="text-decoration:none; color:inherit;">
<article class="blog-landing-card blog-card fade-up">
    <span class="blog-category">{{ include.post.category }}</span>
    <h3 class="blog-card-title">{{ include.post.title }}</h3>
    <p class="blog-card-excerpt">{{ include.post.excerpt }}</p>
    <div class="blog-card-meta">
        <span class="blog-card-date">{{ include.post.date }}</span>
        <span class="blog-read-time">{{ include.post.read_time }}</span>
    </div>
</article>
</a>
